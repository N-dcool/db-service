version: "3.8"

services:
  db-api:
    image: ${DOCKERHUB_USERNAME}/db-service:latest
    container_name: db-api
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - db-data:/app/data
    environment:
      - JWT_SECRET=${JWT_SECRET}
      - PUBLIC_HOST=${PUBLIC_HOST}
      - BACKEND_HOST=${BACKEND_HOST}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=3001
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.db-api.rule=(Host(`${PUBLIC_HOST}`) || Host(`${BACKEND_HOST}`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.db-api.entrypoints=web"
      - "traefik.http.services.db-api.loadbalancer.server.port=3001"
      - "com.centurylinklabs.watchtower.enable=true"
    
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
    networks:
      - proxy  

networks:
  proxy:
    external: true

volumes:
  db-data:   